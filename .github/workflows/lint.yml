name: PR Lint

on:
  pull_request:

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for Go changes
        id: changes
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.go' 'go.mod' 'go.sum')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-go@v6.3.0
        with:
          go-version: 'stable'

      - name: Set up Bun
        if: steps.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build SPA
        if: steps.changes.outputs.skip != 'true'
        run: sh webui/build.sh

      - name: Run golangci-lint
        if: steps.changes.outputs.skip != 'true'
        uses: golangci/golangci-lint-action@v9.2.1

  bun-format:
    name: JS formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for JS-related changes
        id: changes
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'webui/**' 'package.json' 'prettier.config.js')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: bun install

      - name: Run format
        if: steps.changes.outputs.skip != 'true'
        run: bun run format

      - name: Check for formatting changes
        if: steps.changes.outputs.skip != 'true'
        run: |
          if [ -n "$(git diff)" ]; then
            echo "::error::JS files are not formatted. Run 'bun run format' locally"
            git diff
            exit 1
          fi

  no-merge-commits:
    name: No merge commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check for merge commits
        run: |
          MERGE_COMMITS=$(git log --merges --oneline origin/${{ github.base_ref }}..HEAD)
          if [ -n "$MERGE_COMMITS" ]; then
            echo "::error::PR contains merge commits. Please rebase instead of merging"
            echo "$MERGE_COMMITS"
            exit 1
          fi
